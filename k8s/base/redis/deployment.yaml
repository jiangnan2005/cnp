apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: crpi-zyfejs59wqo10ivm.cn-shenzhen.personal.cr.aliyuncs.com/jiangnan5210/redis:7
        ports:
        - containerPort: 6379
        volumeMounts:
        - mountPath: /data
          name: redis-storage

      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
